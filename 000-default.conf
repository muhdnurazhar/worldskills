<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        ServerName www.itnsa.my
        DocumentRoot /var/www/html/www
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>

<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        ServerName intra.itnsa.my
        DocumentRoot /var/www/html/intra
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
        <Directory /var/www/html/intra>
                AuthType Basic
                AuthName "LDAP Protected"
                AuthBasicProvider ldap
                AuthLDAPURL "ldap://192.168.10.10/dc=wsmb2026,dc=my?uid?"
                Require valid-user
                AuthLDAPBindDN "cn=admin,dc=wsmb2026,dc=my"
                AuthLDAPBindPassword Skills39
        </Directory>

</VirtualHost>