---
# DC-SRV3
- name: configure-web-srv3.yml
  hosts: DC-SRV3
  gather_facts: false
  tasks: 
  # STEP 1
  - name: Install apache 
    ansible.builtin.apt:
      name: apache2
      state: present
  # STEP 2
  - name: create folder
    ansible.builtin.file:
      path: /var/www/html/{{ item }}
      state: directory
    loop: 
    - www
    - intra
    
  # STEP 3
  - name: copy apache config file
    ansible.builtin.copy:
      src: /opt/ansible/web/
      dest: /etc/apache2/sites-available/

  # STEP 4
  - ansible.builtin.shell: echo '<h1><center>Welcome to website of DC-SRV3 </center></h1>' > /var/www/html/www/index.html
  - ansible.builtin.shell: echo 'DC-SRV3' > /var/www/html/intra/index.html
  - ansible.builtin.shell: a2enmod ldap authnz_ldap
  - ansible.builtin.shell: systemctl restart apache2
  
    